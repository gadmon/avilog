<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="AVILOG"/>
  <meta name="theme-color" content="#0A0F17"/>
  <title>AVILOG — SACAA Logbook</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23F59E0B'/><text y='.9em' font-size='80' x='10'>✈</text></svg>"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:#0A0F17;color:#F1F5F9;font-family:system-ui,-apple-system,sans-serif;-webkit-text-size-adjust:100%}
    #root{min-height:100vh}
    #splash{position:fixed;inset:0;background:#0A0F17;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:9999;transition:opacity 0.5s}
    #splash.hide{opacity:0;pointer-events:none}
    .sp-icon{width:60px;height:60px;border-radius:14px;background:#F59E0B;display:flex;align-items:center;justify-content:center;font-size:30px;color:#000}
    .sp-title{font-weight:800;font-size:24px;color:#F1F5F9;letter-spacing:.05em}
    .sp-sub{font-size:12px;color:#94A3B8;margin-top:2px}
    .sp-bar-wrap{width:260px;height:5px;background:#111827;border-radius:5px;overflow:hidden;border:1px solid #1E2D42}
    .sp-bar{height:100%;width:5%;background:#F59E0B;border-radius:5px;transition:width 0.4s ease}
    .sp-msg{font-family:monospace;font-size:11px;color:#4B5563}
    #safari-notice{display:none;margin:0 24px;background:#1a1a2e;border:1.5px solid #F59E0B;border-radius:12px;padding:20px;text-align:center;max-width:340px}
    #safari-notice h3{color:#F59E0B;font-size:16px;margin-bottom:10px}
    #safari-notice p{color:#94A3B8;font-size:13px;line-height:1.6;margin-bottom:12px}
    #safari-notice .steps{text-align:left;color:#CBD5E1;font-size:13px;line-height:2}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:#0A0F17}
    ::-webkit-scrollbar-thumb{background:#1E2D42;border-radius:2px}
    @supports(padding:max(0px)){
      body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
    }
    @media print{
      #splash,button{display:none!important}
      body{background:white!important;color:black!important}
      *{color:black!important;background:white!important;border-color:#ccc!important}
      table{font-size:8pt!important;border-collapse:collapse!important}
      th,td{border:1px solid #ddd!important;padding:3px 5px!important}
    }
  </style>
</head>
<body>
<div id="splash">
  <div class="sp-icon">✈</div>

    <div class="sp-title">AVILOG</div>

  </div>

  <div class="sp-msg" id="sp-msg">Starting up…</div>
  <div id="safari-notice">
    <h3>⚠️ Open in Safari</h3>
    <p>AVILOG requires Safari to run. It cannot run in GoodReader, Files app, or Mail.</p>
    <div class="steps">
      1. Tap the <strong style="color:#F59E0B">Share ⬆</strong> button below<br/>
      2. Tap <strong style="color:#F59E0B">Open in Safari</strong><br/>
      3. Bookmark or Add to Home Screen
    </div>
  </div>
</div>
<div id="root"></div>

<script>
// Storage backed by localStorage
window.storage={
  get:async(k)=>{try{const v=localStorage.getItem('av_'+k);return v!=null?{key:k,value:v}:null}catch{return null}},
  set:async(k,v)=>{try{localStorage.setItem('av_'+k,v);return{key:k,value:v}}catch{return null}},
  delete:async(k)=>{try{localStorage.removeItem('av_'+k);return{key:k,deleted:true}}catch{return null}}
};

var _bar=document.getElementById('sp-bar');
var _msg=document.getElementById('sp-msg');
function sp(pct,msg){if(_bar)_bar.style.width=pct+'%';if(_msg&&msg)_msg.textContent=msg;}
window._sp=sp;
sp(8,'Loading React…');

// Detect non-Safari browsers (GoodReader uses WKWebView but without full JS engine context)
// Show Safari notice after 8 seconds if still on splash
var _safariFallback=setTimeout(function(){
  var notice=document.getElementById('safari-notice');
  if(notice){notice.style.display='block';}
  sp(100,'Please open this file in Safari');
},8000);

window._clearFallback=function(){clearTimeout(_safariFallback);};
</script>

<!-- React 18 + ReactDOM (no Babel needed) -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js" 
  onload="window._sp(20,'React loaded…')"
  crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
  onload="window._sp(35,'Initialising…')"
  crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"
  onload="window._sp(45,'Loading data…')"
  crossorigin></script>

<!-- Babel standalone for JSX compilation (cached by browser after first load) -->
<script src="https://unpkg.com/@babel/standalone@7.23.2/babel.min.js"
  onload="window._sp(60,'Compiling…')"
  crossorigin></script>

<script>
// Once all CDN scripts load, compile and run the app
(function waitForBabel(){
  if(typeof Babel==='undefined'||typeof React==='undefined'||typeof ReactDOM==='undefined'||typeof pako==='undefined'){
    setTimeout(waitForBabel,100);return;
  }
  window._sp(70,'Compiling app…');
  try{
    // Get the JSX source and compile it
    var source=document.getElementById('app-jsx').textContent;
    window._sp(80,'Parsing…');
    var compiled=Babel.transform(source,{presets:['react'],filename:'avilog.jsx'}).code;
    window._sp(90,'Running…');
    // Execute compiled code
    var fn=new Function('React','ReactDOM','pako',compiled);
    fn(React,ReactDOM,pako);
    window._clearFallback&&window._clearFallback();
    window._sp(100,'Ready');
    setTimeout(function(){
      var splash=document.getElementById('splash');
      if(splash){splash.classList.add('hide');setTimeout(function(){if(splash.parentNode)splash.parentNode.removeChild(splash);},600);}
    },300);
  }catch(err){
    console.error('Compilation error:',err);
    document.getElementById('sp-msg').textContent='Error: '+err.message.slice(0,80);
    document.getElementById('safari-notice').style.display='block';
  }
})();
</script>

  if (!h && h !== 0) return "—";
  h = Math.max(0, h);
  const hh = Math.floor(h);
  const mm = Math.round((h - hh) * 60);
  return `${String(hh).padStart(2,"0")}:${String(mm).padStart(2,"0")}`;
};

const num = (s) => { try { return parseFloat(s)||0; } catch { return 0; } };
const calcBlock = (out, inn) => {
  if (!out||!inn) return 0;
  const parse = s => { const p=s.replace(":",""); return parseInt(p.slice(0,-2)||"0")*60+parseInt(p.slice(-2)||"0"); };
  let d = parse(inn) - parse(out);
  if (d < 0) d += 1440;
  return Math.round(d/6)/10;
};

// ── Pako loader ──────────────────────────────────────────────────────────────
function usePako(onReady) {
  useEffect(() => {
    if (window.pako) { onReady(); return; }
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js";
    s.onload = onReady;
    document.head.appendChild(s);
  }, []);
}

// ── Shared style atoms ────────────────────────────────────────────────────────
const sInp = {
  width:"100%", background:C.surf, border:`1px solid ${C.border}`, borderRadius:6,
  padding:"7px 10px", color:C.text, fontSize:13, fontFamily:"'JetBrains Mono',monospace",
  outline:"none", boxSizing:"border-box",
};
const sSel = {...sInp, cursor:"pointer"};
const sNum = {...sInp, textAlign:"center"};

function In(p) { return <input style={sInp} {...p}/>; }
function Sel({opts,...p}) { return <select style={sSel} {...p}>{opts.map(o=><option key={o}>{o}</option>)}</select>; }
function Num(p) { return <input style={sNum} type="number" min="0" step="0.1" {...p}/>; }
function INum(p){ return <input style={sNum} type="number" min="0" step="1" {...p}/>; }

// ── Section wrapper ───────────────────────────────────────────────────────────
function Sec({label, children, accent=C.steel}) {
  return (
    <div style={{marginBottom:14}}>
      <div style={{fontSize:9,color:accent,textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700,marginBottom:8,paddingLeft:2}}>
        {label}
      </div>
      <div style={{background:C.surf,borderRadius:9,padding:"12px 14px",border:`1px solid ${C.border}`}}>
        {children}
      </div>
    </div>
  );
}

function Row({children,gap=8}) {
  return <div style={{display:"flex",gap,flexWrap:"wrap",marginBottom:8}}>{children}</div>;
}

function F({label,w="auto",children}) {
  const minW = w==="quarter"?68:w==="third"?88:w==="half"?110:100;
  const flex  = w==="full"?"1 0 100%":w==="half"?"1 0 calc(50% - 4px)":w==="third"?"1 0 calc(33% - 6px)":"1 0 calc(25% - 6px)";
  return (
    <div style={{flex,minWidth:minW}}>
      <div style={{fontSize:9,color:C.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:3}}>{label}</div>
      {children}
    </div>
  );
}

// ── Stat card ─────────────────────────────────────────────────────────────────
function Stat({label,value,unit="h",accent=C.amber}) {
  return (
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 14px",minWidth:100}}>
      <div style={{fontSize:9,color:C.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>{label}</div>
      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:19,fontWeight:800,color:accent,lineHeight:1}}>
        {typeof value==="number"?value.toFixed(1):value}
        <span style={{fontSize:10,color:C.muted,fontWeight:400,marginLeft:3}}>{unit}</span>
      </div>
    </div>
  );
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function Modal({open,onClose,title,children,wide}) {
  if (!open) return null;
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:12}} onClick={onClose}>
      <div style={{background:C.surf,border:`1px solid ${C.border}`,borderRadius:12,width:"100%",maxWidth:wide?800:560,maxHeight:"92vh",overflowY:"auto",boxShadow:"0 24px 80px rgba(0,0,0,.7)"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 22px",borderBottom:`1px solid ${C.border}`,position:"sticky",top:0,background:C.surf,zIndex:2}}>
          <span style={{fontWeight:800,fontSize:15,color:C.text}}>{title}</span>
          <button onClick={onClose} style={{background:"none",border:"none",color:C.steel,fontSize:22,cursor:"pointer",lineHeight:1}}>×</button>
        </div>
        <div style={{padding:"18px 22px"}}>{children}</div>
      </div>
    </div>
  );
}

  trainingCaptain:"", checkCaptain:"",
  picName:"G. Durr", copilot:"",
  pilotRole:"PIC", pfPm:"PF (Pilot Flying)",
  dayTakeoffs:0, dayLandings:0, nightTakeoffs:0, nightLandings:0,
  landings:0, nightLandingsLeg:0, autolands:0,
  approaches:[], holds:0,
  navAids:"", remarks:"", ipcIcc:"",
  me:0, se:0, crossCountry:0,
});

function EntryForm({initial,onSave,onCancel,allAC}) {
  const [f,setF] = useState(()=>({...BLANK_ENTRY(),...(initial||{})}));
  const [addApch,setAddApch] = useState(false);
  const [apch,setApch] = useState({type:"ILS",rwy:"",airport:"",result:"Full Stop"});
  const [regHints,setRegHints] = useState([]);

  const isSim = f.dutyType.includes("Simulator");
  const isGnd = f.dutyType==="Ground Duty"||f.dutyType==="Admin";
  const block = f.totalTime||0;
  const duty  = f.totalDuty||0;

  function set(k,v) {
    setF(p=>{
      const n={...p,[k]:v};
      if(k==="chocksOut"||k==="chocksIn"){
        const o=k==="chocksOut"?v:p.chocksOut, i=k==="chocksIn"?v:p.chocksIn;
        if(o&&i){
          const ft=calcBlock(o,i);
          n.totalTime=ft; n.depTime=o; n.arrTime=i;
          if(n.pilotRole==="PIC"){n.pic=ft;n.sic=0;}
          else if(n.pilotRole==="P1(S) / PICUS"){n.picus=ft;n.pic=0;}
          else if(n.pilotRole.startsWith("Co-Pilot")){n.sic=ft;n.pic=0;}
          if(n.flightRules==="IFR") n.ifr=ft;
        }
      }
      if(k==="fdpStart"||k==="fdpEnd"){
        const s=k==="fdpStart"?v:p.fdpStart, e=k==="fdpEnd"?v:p.fdpEnd;
        if(s&&e) n.totalFDP=calcBlock(s,e);
      }
      if(k==="onDuty"||k==="offDuty"){
        const s=k==="onDuty"?v:p.onDuty, e=k==="offDuty"?v:p.offDuty;
        if(s&&e) n.totalDuty=calcBlock(s,e);
      }
      if(k==="pilotRole"&&n.totalTime>0){
        const t=n.totalTime;
        if(v==="PIC"){n.pic=t;n.picus=0;n.sic=0;n.dual=0;}
        else if(v==="P1(S) / PICUS"){n.picus=t;n.pic=0;n.sic=0;}
        else if(v.startsWith("Co-Pilot")){n.sic=t;n.pic=0;n.picus=0;}
        else if(v.includes("SFI")||v.includes("Instructor")){n.sic=t;n.pic=0;}
      }
      if(k==="p1") n.picName=v;
      if(k==="p2") n.copilot=v;
      return n;
    });
  }

  function lookupReg(reg) {
    set("aircraftReg",reg.toUpperCase());
    // Suggest known ZS regs from parsed data
    const up=reg.toUpperCase();
    if(up.length>=4&&window._regIndex){
      const hits=window._regIndex.filter(r=>r.startsWith(up)).slice(0,6);
      setRegHints(hits);
    } else setRegHints([]);
  }

  function addApproach(){
    setF(p=>({...p,approaches:[...(p.approaches||[]),{...apch}]}));
    setApch({type:"ILS",rwy:"",airport:f.arrAirport||"",result:"Full Stop"});
    setAddApch(false);
  }

  return (
    <div>
      {/* 1 — DUTY */}
      <Sec label="Duty" accent={C.amber}>
        <Row>
          <F label="Type" w="half"><Sel opts={DUTY_TYPES} value={f.dutyType} onChange={e=>set("dutyType",e.target.value)}/></F>
          <F label="Date (Zulu)" w="half"><In type="date" value={f.date} onChange={e=>set("date",e.target.value)}/></F>
        </Row>
        <Row>
          <F label="Flight #" w="half"><In value={f.flightNumber} onChange={e=>set("flightNumber",e.target.value.toUpperCase())} placeholder="SA280 / FA101"/></F>
          <F label="Flight Rules" w="half"><Sel opts={["IFR","VFR","SVFR"]} value={f.flightRules} onChange={e=>set("flightRules",e.target.value)}/></F>
        </Row>
      </Sec>

      {/* 2 — AIRCRAFT */}
      <Sec label="Aircraft" accent={C.teal}>
        <Row>
          <F label="Type" w="half">
            <select style={sSel} value={f.aircraftType} onChange={e=>set("aircraftType",e.target.value)}>
              <option value="">— Select —</option>
              {allAC.map(a=><option key={a.type} value={a.type}>{a.type} — {a.model}</option>)}
            </select>
          </F>
          <F label="Registration" w="half">
            <In value={f.aircraftReg} onChange={e=>lookupReg(e.target.value)} placeholder="ZS-SXD / ZF-001"/>
            {regHints.length>0&&(
              <div style={{marginTop:3}}>
                {regHints.map((r,i)=>(
                  <div key={i} onClick={()=>{set("aircraftReg",r);setRegHints([]);}}
                    style={{background:C.card,borderRadius:4,padding:"3px 7px",marginBottom:2,cursor:"pointer",fontSize:11,color:C.amber,fontFamily:"monospace"}}>{r}</div>
                ))}
              </div>
            )}
          </F>
        </Row>
        {f.aircraftType&&acMap[f.aircraftType]&&(
          <div style={{fontSize:10,color:C.teal,marginTop:-4,marginBottom:4}}>
            {acMap[f.aircraftType].cat} · {acMap[f.aircraftType].eng} eng · {acMap[f.aircraftType].seats} seats
            {acMap[f.aircraftType].mtow>0?` · MTOW ${(acMap[f.aircraftType].mtow/1000).toFixed(1)}t`:""}
          </div>
        )}
      </Sec>

      {/* 3 — ROUTE (flight only) */}
      {!isGnd&&!isSim&&(
        <Sec label="Route" accent={C.green}>
          <Row>
            <F label="From (ICAO)" w="half">
              <In list="dep-l" value={f.depAirport} onChange={e=>set("depAirport",e.target.value.toUpperCase())} placeholder="FAOR" maxLength={4}/>
              <datalist id="dep-l">{SA_AIRPORTS.map(a=><option key={a.icao} value={a.icao}>{a.name} ({a.city})</option>)}</datalist>
            </F>
            <F label="To (ICAO)" w="half">
              <In list="arr-l" value={f.arrAirport} onChange={e=>set("arrAirport",e.target.value.toUpperCase())} placeholder="YPPH" maxLength={4}/>
              <datalist id="arr-l">{SA_AIRPORTS.map(a=><option key={a.icao} value={a.icao}>{a.name} ({a.city})</option>)}</datalist>
            </F>
          </Row>
          <Row>
            <F label="Sched Out" w="quarter"><In type="time" value={f.scheduledOut} onChange={e=>set("scheduledOut",e.target.value)}/></F>
            <F label="Sched In" w="quarter"><In type="time" value={f.scheduledIn} onChange={e=>set("scheduledIn",e.target.value)}/></F>
          </Row>
        </Sec>
      )}

      {/* 4 — BLOCK TIMES */}
      <Sec label="Block Times — All Zulu (UTC)" accent={C.amber}>
        <Row>
          <F label="Chocks Out" w="quarter"><In type="time" value={f.chocksOut} onChange={e=>set("chocksOut",e.target.value)}/></F>
          <F label="Chocks In" w="quarter"><In type="time" value={f.chocksIn} onChange={e=>set("chocksIn",e.target.value)}/></F>
          <F label="Block Time" w="quarter">
            <div style={{...sInp,background:C.card,color:C.amber,fontWeight:700,textAlign:"center"}}>{hhmm(block)}</div>
          </F>
          {isSim&&<F label="Sim Time (hrs)" w="quarter"><Num value={f.simTime} onChange={e=>set("simTime",num(e.target.value))}/></F>}
        </Row>
        <Row>
          <F label="Off Block" w="quarter"><In type="time" value={f.offBlock} onChange={e=>set("offBlock",e.target.value)}/></F>
          <F label="On Block" w="quarter"><In type="time" value={f.onBlock} onChange={e=>set("onBlock",e.target.value)}/></F>
          <F label="Night (hrs)" w="quarter"><Num value={f.night} onChange={e=>set("night",num(e.target.value))}/></F>
        </Row>
      </Sec>

      {/* 5 — DUTY/FDP */}
      <Sec label="Duty Period (FDP)" accent={C.purple}>
        <Row>
          <F label="On Duty" w="quarter"><In type="time" value={f.onDuty} onChange={e=>set("onDuty",e.target.value)}/></F>
          <F label="Off Duty" w="quarter"><In type="time" value={f.offDuty} onChange={e=>set("offDuty",e.target.value)}/></F>
          <F label="Total Duty" w="quarter">
            <div style={{...sInp,background:C.card,color:C.steel,fontWeight:700,textAlign:"center"}}>{hhmm(duty)}</div>
          </F>
          <F label="Rest Before (hrs)" w="quarter"><Num value={f.restBeforeDuty} onChange={e=>set("restBeforeDuty",num(e.target.value))}/></F>
        </Row>
        <Row>
          <F label="FDP Start" w="quarter"><In type="time" value={f.fdpStart} onChange={e=>set("fdpStart",e.target.value)}/></F>
          <F label="FDP End" w="quarter"><In type="time" value={f.fdpEnd} onChange={e=>set("fdpEnd",e.target.value)}/></F>
          <F label="Total FDP" w="quarter">
            <div style={{...sInp,background:C.card,color:C.purple,fontWeight:700,textAlign:"center"}}>{hhmm(f.totalFDP||0)}</div>
          </F>
        </Row>
      </Sec>

      {/* 6 — CREW */}
      <Sec label="Crew" accent={C.blue}>
        <Row>
          <F label="P1 — Captain / PIC" w="half"><In value={f.p1} onChange={e=>set("p1",e.target.value)} placeholder="G. Durr"/></F>
          <F label="P2 — First Officer / SIC" w="half"><In value={f.p2} onChange={e=>set("p2",e.target.value)} placeholder="Name"/></F>
        </Row>
        <Row>
          <F label="P3 — Second Officer" w="half"><In value={f.p3} onChange={e=>set("p3",e.target.value)} placeholder="If applicable"/></F>
          <F label="Observer" w="half"><In value={f.observer} onChange={e=>set("observer",e.target.value)} placeholder="Observer / Safety pilot"/></F>
        </Row>
        <Row>
          <F label="Training / Check Captain" w="full"><In value={f.trainingCaptain} onChange={e=>set("trainingCaptain",e.target.value)} placeholder="Name if applicable"/></F>
        </Row>
        <Row>
          <F label="My Role" w="half"><Sel opts={PILOT_ROLES} value={f.pilotRole} onChange={e=>set("pilotRole",e.target.value)}/></F>
          <F label="PF / PM" w="half"><Sel opts={PF_PM_OPTS} value={f.pfPm} onChange={e=>set("pfPm",e.target.value)}/></F>
        </Row>
      </Sec>

      {/* 7 — TIME BREAKDOWN */}
      {!isGnd&&(
        <Sec label="SACAA Time Breakdown — Cols 14–29 (hrs)" accent={C.teal}>
          <Row>
            {[["PIC",f.pic,"pic"],["P1(S)/PICUS",f.picus,"picus"],["Co-Pilot/SIC",f.sic,"sic"],["Dual/Instr",f.dual,"dual"]].map(([l,v,k])=>(
              <F key={k} label={l} w="quarter"><Num value={v} onChange={e=>set(k,num(e.target.value))}/></F>
            ))}
          </Row>
          <Row>
            {[["Actual Inst",f.actualInst,"actualInst"],["IFR",f.ifr,"ifr"],["XC",f.xc,"xc"],isSim?["Sim Time",f.simTime,"simTime"]:["Night",f.night,"night"]].map(([l,v,k])=>(
              <F key={k} label={l} w="quarter"><Num value={v} onChange={e=>set(k,num(e.target.value))}/></F>
            ))}
          </Row>
        </Sec>
      )}

      {/* 8 — MOVEMENTS */}
      {!isGnd&&!isSim&&(
        <Sec label="Movements" accent={C.green}>
          <Row>
            {[["Day T/O",f.dayTakeoffs,"dayTakeoffs"],["Day Ldg",f.dayLandings,"dayLandings"],["Night T/O",f.nightTakeoffs,"nightTakeoffs"],["Night Ldg",f.nightLandings,"nightLandings"],["Autolands",f.autolands,"autolands"]].map(([l,v,k])=>(
              <F key={k} label={l} w="quarter"><INum value={v} onChange={e=>set(k,parseInt(e.target.value)||0)}/></F>
            ))}
          </Row>
        </Sec>
      )}

      {/* 9 — APPROACHES & HOLDS */}
      {!isGnd&&(
        <Sec label="Approaches & Holds" accent={C.teal}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <span style={{fontSize:11,color:C.muted}}>{(f.approaches||[]).length} approach{f.approaches?.length!==1?"es":""} logged</span>
            <button onClick={()=>setAddApch(true)} style={{background:"none",border:`1px solid ${C.teal}`,color:C.teal,borderRadius:5,padding:"3px 10px",fontSize:11,cursor:"pointer"}}>+ Add</button>
          </div>
          {(f.approaches||[]).map((a,i)=>(
            <div key={i} style={{display:"flex",gap:8,alignItems:"center",background:C.card,borderRadius:6,padding:"5px 10px",marginBottom:4,fontSize:12}}>
              <span style={{color:C.teal,fontFamily:"monospace",fontWeight:700,minWidth:70}}>{a.type}</span>
              <span style={{color:C.steel}}>{a.rwy?"RWY "+a.rwy:"—"}</span>
              <span style={{color:C.amber}}>{a.airport}</span>
              <span style={{color:C.muted,fontSize:10}}>{a.result}</span>
              <button onClick={()=>setF(p=>({...p,approaches:p.approaches.filter((_,j)=>j!==i)}))}
                style={{marginLeft:"auto",background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:15}}>×</button>
            </div>
          ))}
          {addApch&&(
            <div style={{background:C.card,borderRadius:8,padding:10,marginTop:8}}>
              <Row>
                <F label="Type" w="third"><Sel opts={APPROACH_TYPES} value={apch.type} onChange={e=>setApch(p=>({...p,type:e.target.value}))}/></F>
                <F label="Runway" w="third"><In value={apch.rwy} onChange={e=>setApch(p=>({...p,rwy:e.target.value}))} placeholder="03L"/></F>
                <F label="Airport" w="third"><In value={apch.airport} onChange={e=>setApch(p=>({...p,airport:e.target.value.toUpperCase()}))} placeholder="FAOR" maxLength={4}/></F>
              </Row>
              <Row>
                <F label="Result" w="half">
                  <Sel opts={["Full Stop","Touch & Go","Go-Around","Missed Approach","Low Pass","Circling","Autoland"]} value={apch.result} onChange={e=>setApch(p=>({...p,result:e.target.value}))}/>
                </F>
                <F label="" w="half">
                  <div style={{display:"flex",gap:7,paddingTop:14}}>
                    <button onClick={addApproach} style={{background:C.teal,border:"none",color:"#000",borderRadius:5,padding:"5px 14px",fontSize:12,cursor:"pointer",fontWeight:700}}>Add</button>
                    <button onClick={()=>setAddApch(false)} style={{background:"none",border:`1px solid ${C.border}`,color:C.steel,borderRadius:5,padding:"5px 14px",fontSize:12,cursor:"pointer"}}>Cancel</button>
                  </div>
                </F>
              </Row>
            </div>
          )}
          <div style={{marginTop:8,display:"flex",alignItems:"center",gap:10}}>
            <div style={{fontSize:9,color:C.muted,textTransform:"uppercase",letterSpacing:"0.08em",minWidth:80}}>Holds flown</div>
            <INum style={{...sNum,width:72}} value={f.holds||0} onChange={e=>set("holds",parseInt(e.target.value)||0)}/>
          </div>
        </Sec>
      )}

      {/* 10 — REMARKS */}
      <Sec label="Remarks / Endorsements / IPC" accent={C.steel}>
        <textarea style={{...sInp,width:"100%",minHeight:64,resize:"vertical",fontFamily:"system-ui",fontSize:12,boxSizing:"border-box"}}
          value={f.remarks} onChange={e=>set("remarks",e.target.value)}
          placeholder="Training details · Check ride · Incident · Endorsements · Route notes…"/>
        <div style={{marginTop:8}}>
          <div style={{fontSize:9,color:C.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>IPC / ICC</div>
          <In value={f.ipcIcc||""} onChange={e=>set("ipcIcc",e.target.value)} placeholder="IPC/ICC details if applicable"/>
        </div>
      </Sec>

      {/* Summary strip */}
      <div style={{background:C.card,borderRadius:8,padding:"9px 14px",marginBottom:14,display:"flex",gap:14,flexWrap:"wrap",alignItems:"center",border:`1px solid ${C.border}`}}>
        <span style={{fontFamily:"monospace",color:C.amber,fontSize:13,fontWeight:700}}>
          {isSim?`SIM ${hhmm(f.simTime||0)}`:`Block ${hhmm(block)}`}
        </span>
        {duty>0&&<span style={{fontFamily:"monospace",color:C.steel,fontSize:12}}>Duty {hhmm(duty)}</span>}
        {(f.totalFDP||0)>0&&<span style={{fontFamily:"monospace",color:C.purple,fontSize:12}}>FDP {hhmm(f.totalFDP)}</span>}
        {f.night>0&&<span style={{fontFamily:"monospace",color:C.blue,fontSize:12}}>Night {hhmm(f.night)}</span>}
        {f.ifr>0&&<span style={{fontFamily:"monospace",color:C.purple,fontSize:12}}>IFR {hhmm(f.ifr)}</span>}
        {(f.approaches||[]).length>0&&<span style={{color:C.teal,fontSize:12}}>{f.approaches.length} apch</span>}
        {f.autolands>0&&<span style={{color:C.green,fontSize:12}}>{f.autolands}× Autoland</span>}
        {f.holds>0&&<span style={{color:C.amber,fontSize:12}}>{f.holds}× Hold</span>}
      </div>

      <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
        <button onClick={onCancel} style={{background:"none",border:`1px solid ${C.border}`,color:C.steel,borderRadius:8,padding:"9px 20px",fontSize:14,cursor:"pointer"}}>Cancel</button>
        <button onClick={()=>onSave(f)} style={{background:C.amber,border:"none",color:"#000",borderRadius:8,padding:"9px 20px",fontSize:14,fontWeight:700,cursor:"pointer"}}>Save Entry</button>
      </div>
    </div>
  );
}

// ── Entry Detail View ─────────────────────────────────────────────────────────
function EntryDetail({e,onEdit,onDelete,onClose}) {
  if(!e) return null;
  const ac=acMap[e.aircraftType];
  const isSim=e.dutyType&&e.dutyType.includes("Simulator");
  const isGnd=e.dutyType==="Ground Duty"||e.dutyType==="Admin";
  const ft=isSim?(e.simTime||0):(e.totalTime||0);
  const roleColor=e.pilotRole==="PIC"?C.amber:e.pilotRole?.startsWith("P1(S)")?C.purple:e.pilotRole?.includes("SFI")||e.pilotRole?.includes("Instructor")?C.green:C.teal;
  return (
    <div>
      {/* Badges */}
      <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
        <span style={{background:C.amber+"22",color:C.amber,borderRadius:5,padding:"3px 10px",fontSize:12,fontWeight:700}}>{fmtDate(e.date)}</span>
        {e.flightNumber&&<span style={{background:C.surf,color:C.text,borderRadius:5,padding:"3px 10px",fontSize:12,fontFamily:"monospace",fontWeight:700,border:`1px solid ${C.border}`}}>{e.flightNumber}</span>}
        <span style={{background:C.teal+"22",color:C.teal,borderRadius:5,padding:"3px 10px",fontSize:12}}>{e.dutyType}</span>
        {e.flightRules&&<span style={{background:C.border,color:C.steel,borderRadius:5,padding:"3px 10px",fontSize:12}}>{e.flightRules}</span>}
        {e.pfPm&&<span style={{background:C.purple+"22",color:C.purple,borderRadius:5,padding:"3px 10px",fontSize:12}}>{e.pfPm}</span>}
      </div>

      {/* Aircraft + Route */}
      <div style={{background:C.card,borderRadius:10,padding:"12px 16px",marginBottom:10,border:`1px solid ${C.border}`}}>
        <div style={{fontSize:20,fontWeight:900,color:C.amber,fontFamily:"monospace"}}>{e.aircraftReg||e.aircraftType}</div>
        {ac&&<div style={{color:C.steel,fontSize:12,marginTop:2}}>{ac.make} {ac.model} · {ac.cat}</div>}
        {!isGnd&&(e.route||e.depAirport)&&(
          <div style={{marginTop:8,fontSize:16,color:C.text,fontFamily:"monospace",fontWeight:700}}>
            {e.route||(e.depAirport&&e.arrAirport?`${e.depAirport} → ${e.arrAirport}`:"")}
          </div>
        )}
      </div>

      {/* Times */}
      {!isGnd&&(e.chocksOut||e.totalTime>0)&&(
        <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
          {[
            ["Chocks Out",e.chocksOut||e.depTime||"—",C.amber],
            ["Chocks In",e.chocksIn||e.arrTime||"—",C.amber],
            ["Block",hhmm(ft),C.text],
            ...(e.totalDuty?[["Duty",hhmm(e.totalDuty),C.steel]]:e.totalFDP?[["FDP",hhmm(e.totalFDP),C.purple]]:[]),
          ].map(([l,v,col])=>(
            <div key={l} style={{background:C.card,borderRadius:7,padding:"7px 12px",border:`1px solid ${C.border}`}}>
              <div style={{fontSize:9,color:C.muted,textTransform:"uppercase",marginBottom:2}}>{l}</div>
              <div style={{fontFamily:"monospace",color:col,fontSize:14,fontWeight:700}}>{v}</div>
            </div>
          ))}
        </div>
      )}

      {/* Crew */}
      {(e.p1||e.picName||e.p2||e.copilot||e.p3||e.trainingCaptain)&&(
        <div style={{display:"flex",gap:7,marginBottom:10,flexWrap:"wrap"}}>
          {(e.p1||e.picName)&&<div style={{background:C.card,borderRadius:7,padding:"6px 11px",flex:1,minWidth:110,border:`1px solid ${C.border}`}}>
            <div style={{fontSize:9,color:C.muted,marginBottom:2}}>P1 / PIC</div>
            <div style={{fontSize:13,color:C.text,fontWeight:600}}>{e.p1||e.picName}</div>
          </div>}
          {(e.p2||e.copilot)&&<div style={{background:C.card,borderRadius:7,padding:"6px 11px",flex:1,minWidth:110,border:`1px solid ${C.border}`}}>
            <div style={{fontSize:9,color:C.muted,marginBottom:2}}>P2 / SIC</div>
            <div style={{fontSize:13,color:C.text,fontWeight:600}}>{e.p2||e.copilot}</div>
          </div>}
          {e.p3&&<div style={{background:C.card,borderRadius:7,padding:"6px 11px",flex:1,minWidth:80,border:`1px solid ${C.border}`}}>
            <div style={{fontSize:9,color:C.muted,marginBottom:2}}>P3</div>
            <div style={{fontSize:13,color:C.text}}>{e.p3}</div>
          </div>}
          {e.trainingCaptain&&<div style={{background:C.green+"11",borderRadius:7,padding:"6px 11px",flex:1,minWidth:110,border:`1px solid ${C.green}33`}}>
            <div style={{fontSize:9,color:C.green,marginBottom:2}}>Trg / Check Capt</div>
            <div style={{fontSize:13,color:C.text}}>{e.trainingCaptain}</div>
          </div>}
          <div style={{background:C.card,borderRadius:7,padding:"6px 11px",border:`1px solid ${C.border}`}}>
            <div style={{fontSize:9,color:C.muted,marginBottom:2}}>Role</div>
            <div style={{fontSize:13,color:roleColor,fontWeight:700}}>{e.pilotRole}</div>
          </div>
        </div>
      )}

      {/* SACAA time grid */}
      <div style={{background:C.bg,borderRadius:9,padding:"12px 14px",marginBottom:10,border:`1px solid ${C.border}`}}>
        <div style={{fontSize:9,color:C.steel,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>SACAA Time Breakdown</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6}}>
          {[
            ["Block/Sim",hhmm(ft),C.amber],
            ["PIC",hhmm(e.pic||0),C.amber],
            ["PICUS",hhmm(e.picus||0),C.purple],
            ["SIC/Co-Pilot",hhmm(e.sic||0),C.steel],
            ["Dual/Instr",hhmm(e.dual||0),C.green],
            ["Night",hhmm(e.night||0),C.blue],
            ["Actual Inst",hhmm(e.actualInst||0),C.purple],
            ["IFR",hhmm(e.ifr||0),C.purple],
            ["XC",hhmm(e.xc||0),C.teal],
            ["Sim",hhmm(e.simTime||e.simulator||0),C.muted],
          ].map(([l,v,col])=>(
            <div key={l} style={{background:C.surf,borderRadius:5,padding:"6px 8px",border:`1px solid ${C.border}`}}>
              <div style={{fontSize:8,color:C.muted,marginBottom:2}}>{l}</div>
              <div style={{fontFamily:"monospace",color:col,fontWeight:700,fontSize:12}}>{v}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Movements */}
      {!isGnd&&!isSim&&(e.dayTakeoffs>0||e.dayLandings>0||e.nightTakeoffs>0||e.nightLandings>0||e.autolands>0)&&(
        <div style={{display:"flex",gap:7,marginBottom:10,flexWrap:"wrap"}}>
          {[["Day T/O",e.dayTakeoffs||0,C.amber],["Day Ldg",e.dayLandings||0,C.green],["Night T/O",e.nightTakeoffs||0,C.blue],["Night Ldg",e.nightLandings||0,C.blue],["Autolands",e.autolands||0,C.teal]].filter(([,v])=>v>0).map(([l,v,col])=>(
            <div key={l} style={{background:C.card,borderRadius:7,padding:"6px 12px",textAlign:"center",border:`1px solid ${C.border}`}}>
              <div style={{fontSize:9,color:C.muted}}>{l}</div>
              <div style={{fontFamily:"monospace",fontSize:17,color:col,fontWeight:800}}>{v}</div>
            </div>
          ))}
        </div>
      )}

      {/* Approaches + Holds */}
      {((e.approaches||[]).length>0||e.holds>0)&&(
        <div style={{marginBottom:10}}>
          <div style={{fontSize:9,color:C.steel,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>
            Approaches {e.holds>0?`· ${e.holds} hold${e.holds>1?"s":""}`:""}
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
            {(e.approaches||[]).map((a,i)=>(
              <span key={i} style={{background:C.teal+"22",color:C.teal,borderRadius:5,padding:"4px 10px",fontSize:12,fontWeight:600,border:`1px solid ${C.teal}33`}}>
                {a.type} {a.rwy&&`RWY${a.rwy}`} {a.airport} {a.result&&a.result!=="Full Stop"?`(${a.result})`:""}
              </span>
            ))}
            {e.holds>0&&<span style={{background:C.amber+"22",color:C.amber,borderRadius:5,padding:"4px 10px",fontSize:12,fontWeight:600,border:`1px solid ${C.amber}33`}}>{e.holds}× Hold</span>}
          </div>
        </div>
      )}

      {/* Remarks */}
      {e.remarks&&(
        <div style={{background:C.bg,borderRadius:8,padding:"10px 13px",marginBottom:10,fontSize:12,color:C.steel,lineHeight:1.7,borderLeft:`3px solid ${C.amber}`,border:`1px solid ${C.border}`,borderLeftColor:C.amber}}>
          <div style={{fontSize:9,color:C.muted,textTransform:"uppercase",marginBottom:4}}>Remarks</div>
          {e.remarks}
        </div>
      )}
      {e.ipcIcc&&<div style={{fontSize:12,color:C.green,marginBottom:10}}>IPC/ICC: {e.ipcIcc}</div>}

      <div style={{display:"flex",gap:10,justifyContent:"flex-end",paddingTop:12,borderTop:`1px solid ${C.border}`}}>
        <button onClick={()=>onDelete(e.id)} style={{background:"none",border:`1px solid ${C.red}`,color:C.red,borderRadius:8,padding:"8px 16px",fontSize:13,cursor:"pointer"}}>Delete</button>
        <button onClick={()=>onEdit(e)} style={{background:C.amber,border:"none",color:"#000",borderRadius:8,padding:"8px 16px",fontSize:13,fontWeight:700,cursor:"pointer"}}>Edit</button>
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function AviLog() {
  const [entries,setEntries]     = useState([]);
  const [loading,setLoading]     = useState(true);
  const [progress,setProgress]   = useState(0);
  const [tab,setTab]             = useState("log");
  const [showNew,setShowNew]     = useState(false);
  const [editEntry,setEditEntry] = useState(null);
  const [viewEntry,setViewEntry] = useState(null);
  const [search,setSearch]       = useState("");
  const [filterType,setFilterType] = useState("");
  const [filterRole,setFilterRole] = useState("");
  const [filterDate,setFilterDate] = useState({from:"",to:""});
  const [expandedAC,setExpandedAC] = useState(null);
  const [pakoOk,setPakoOk]       = useState(false);
  const [customAC,setCustomAC]   = useState([]);
  const allAC = [...AC_TYPES, ...customAC];

  // Load pako then decompress embedded data
  usePako(()=>setPakoOk(true));

  useEffect(()=>{
    if(!pakoOk) return;
    async function load(){
      try {
        // Try persistent storage first
        const cached = await window.storage.get("avilog_v1").catch(()=>null);
        if(cached&&cached.value){
          setProgress(80);
          const all=JSON.parse(cached.value);
          all.sort((a,b)=>b.date.localeCompare(a.date));
          // Build reg index for autocomplete
          window._regIndex=[...new Set(all.map(e=>e.aircraftReg).filter(r=>r&&r.length>2))].sort();
          setEntries(all);
          setProgress(100);
          setLoading(false);
          return;
        }
        // Decompress embedded data
        setProgress(20);
        const raw = DATA_B64.join("");
        const binary = atob(raw);
        setProgress(40);
        const bytes = new Uint8Array(binary.length);
        for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
        setProgress(60);
        const json = window.pako.inflate(bytes,{to:"string"});
        setProgress(80);
        const all = JSON.parse(json);
        all.sort((a,b)=>b.date.localeCompare(a.date));
        window._regIndex=[...new Set(all.map(e=>e.aircraftReg).filter(r=>r&&r.length>2))].sort();
        await window.storage.set("avilog_v1",JSON.stringify(all)).catch(()=>{});
        setEntries(all);
        setProgress(100);
        setLoading(false);
      } catch(err){
        console.error(err);
        setEntries([]);
        setLoading(false);
      }
    }
    load();
  },[pakoOk]);

  function persist(next){
    window.storage.set("avilog_v1",JSON.stringify(next)).catch(()=>{});
    window._regIndex=[...new Set(next.map(e=>e.aircraftReg).filter(r=>r&&r.length>2))].sort();
  }

  function saveEntry(e){
    setEntries(p=>{
      const i=p.findIndex(x=>x.id===e.id);
      const next=i>=0?p.map((x,j)=>j===i?e:x):[e,...p];
      const sorted=[...next].sort((a,b)=>b.date.localeCompare(a.date));
      persist(sorted); return sorted;
    });
    setShowNew(false); setEditEntry(null);
  }

  function deleteEntry(id){
    if(!window.confirm("Delete this entry?")) return;
    setEntries(p=>{const next=p.filter(x=>x.id!==id); persist(next); return next;});
    setViewEntry(null);
  }

  // ── Computed totals ─────────────────────────────────────────────────────
  const totals = useMemo(()=>{
    return entries.reduce((a,e)=>{
      a.total  +=(e.totalTime||0)+(e.simTime||0);
      a.flight +=(e.totalTime||0);
      a.sim    +=(e.simTime||0);
      a.pic    +=(e.pic||0);
      a.picus  +=(e.picus||0);
      a.sic    +=(e.sic||0);
      a.dual   +=(e.dual||0);
      a.night  +=(e.night||0);
      a.ifr    +=(e.ifr||e.actualInst||0);
      a.xc     +=(e.xc||0);
      a.ldgs   +=(e.dayLandings||e.landings||0);
      a.nldgs  +=(e.nightLandings||0);
      a.autolands+=(e.autolands||0);
      a.approaches+=(e.approaches||[]).length;
      a.holds  +=(e.holds||0);
      return a;
    },{total:0,flight:0,sim:0,pic:0,picus:0,sic:0,dual:0,night:0,ifr:0,xc:0,ldgs:0,nldgs:0,autolands:0,approaches:0,holds:0});
  },[entries]);

  // ── Currency (SACAA CAR Part 61) ────────────────────────────────────────
  const now90 = new Date(Date.now()-90*86400000);
  const recent90 = useMemo(()=>entries.filter(e=>new Date(e.date)>=now90),[entries]);
  const currency = {
    dayLdgs: recent90.reduce((s,e)=>s+(e.dayLandings||e.landings||0),0),
    nightLdgs: recent90.reduce((s,e)=>s+(e.nightLandings||0),0),
    approaches: recent90.reduce((s,e)=>s+(e.approaches||[]).length,0),
    ifrHrs: recent90.reduce((s,e)=>s+(e.ifr||e.actualInst||0),0),
  };

  // ── By type ─────────────────────────────────────────────────────────────
  const byType = useMemo(()=>{
    const m={};
    entries.forEach(e=>{
      const t=e.aircraftType||"Unknown";
      if(!m[t]) m[t]={total:0,flight:0,sim:0,pic:0,sic:0,picus:0,night:0,ldgs:0,entries:0};
      m[t].total  +=(e.totalTime||0)+(e.simTime||0);
      m[t].flight +=(e.totalTime||0);
      m[t].sim    +=(e.simTime||0);
      m[t].pic    +=(e.pic||0);
      m[t].sic    +=(e.sic||0);
      m[t].picus  +=(e.picus||0);
      m[t].night  +=(e.night||0);
      m[t].ldgs   +=(e.dayLandings||0);
      m[t].entries++;
    });
    return m;
  },[entries]);

  // ── Filtered entries ────────────────────────────────────────────────────
  const filtered = useMemo(()=>{
    return entries.filter(e=>{
      if(filterType&&e.aircraftType!==filterType) return false;
      if(filterRole&&e.pilotRole!==filterRole) return false;
      if(filterDate.from&&e.date<filterDate.from) return false;
      if(filterDate.to&&e.date>filterDate.to) return false;
      if(search){
        const q=search.toLowerCase();
        const hay=`${e.aircraftReg} ${e.depAirport} ${e.arrAirport} ${e.aircraftType} ${e.flightNumber} ${e.p1||e.picName} ${e.p2||e.copilot} ${e.remarks} ${e.route}`.toLowerCase();
        if(!hay.includes(q)) return false;
      }
      return true;
    });
  },[entries,filterType,filterRole,filterDate,search]);

  // ── Loading screen ───────────────────────────────────────────────────────
  if(loading){
    return (
      <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:20}}>
        <div style={{width:52,height:52,borderRadius:12,background:C.amber,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,fontWeight:900,color:"#000"}}>✈</div>
        <div style={{textAlign:"center"}}>
          <div style={{fontWeight:800,fontSize:22,color:C.text,letterSpacing:"0.04em"}}>AVILOG</div>
          <div style={{fontSize:12,color:C.steel,marginTop:3}}>SACAA-Compliant Logbook · G. Durr</div>
        </div>
        <div style={{width:260,background:C.surf,borderRadius:8,overflow:"hidden",border:`1px solid ${C.border}`}}>
          <div style={{height:5,width:`${progress}%`,background:C.amber,transition:"width 0.3s",borderRadius:8}}/>
        </div>
        <div style={{fontFamily:"monospace",fontSize:12,color:C.muted}}>{progress<100?"Decompressing flight records…":"Ready"}</div>
      </div>
    );
  }

  // ── Nav tabs ─────────────────────────────────────────────────────────────
  const TABS=[
    {id:"log",label:"Logbook",icon:"📋"},
    {id:"totals",label:"Totals",icon:"📊"},
    {id:"types",label:"Aircraft",icon:"✈️"},
    {id:"currency",label:"Currency",icon:"🛡️"},
    {id:"reports",label:"Reports",icon:"📄"},
    {id:"pilot",label:"Pilot",icon:"👤"},
  ];

  return (
    <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"system-ui,-apple-system,sans-serif"}}>
      {/* ── Header ── */}
      <div style={{background:C.surf,borderBottom:`1px solid ${C.border}`,padding:"0 16px",position:"sticky",top:0,zIndex:100}}>
        <div style={{maxWidth:1100,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",height:52}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:32,height:32,borderRadius:7,background:C.amber,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:900,color:"#000"}}>✈</div>
            <div>
              <div style={{fontWeight:800,fontSize:14,letterSpacing:"0.05em",color:C.text}}>AVILOG</div>
              <div style={{fontSize:9,color:C.muted,letterSpacing:"0.1em"}}>SACAA · {entries.length.toLocaleString()} ENTRIES</div>
            </div>
          </div>
          <button onClick={()=>setShowNew(true)} style={{background:C.amber,border:"none",color:"#000",borderRadius:7,padding:"7px 14px",fontSize:13,fontWeight:700,cursor:"pointer"}}>+ Log Entry</button>
        </div>
        {/* Tabs */}
        <div style={{maxWidth:1100,margin:"0 auto",display:"flex",overflowX:"auto"}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{background:"none",border:"none",color:tab===t.id?C.amber:C.steel,padding:"10px 12px",fontSize:13,fontWeight:tab===t.id?700:400,cursor:"pointer",borderBottom:tab===t.id?`2px solid ${C.amber}`:"2px solid transparent",whiteSpace:"nowrap"}}>
              {t.icon} {t.label}
            </button>
          ))}
        </div>
      </div>

      <div style={{maxWidth:1100,margin:"0 auto",padding:"16px 14px"}}>

        {/* ══ LOGBOOK TAB ══ */}
        {tab==="log"&&(
          <div>
            {/* Quick stats */}
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
              <Stat label="Total Career" value={totals.total}/>
              <Stat label="PIC" value={totals.pic} accent={C.teal}/>
              <Stat label="PICUS" value={totals.picus} accent={C.purple}/>
              <Stat label="Co-Pilot/SIC" value={totals.sic} accent={C.steel}/>
              <Stat label="Night" value={totals.night} accent={C.blue}/>
              <Stat label="Sim (FSTD)" value={totals.sim} accent={C.muted}/>
              <Stat label="IFR Actual" value={totals.ifr} accent={C.purple}/>
              <Stat label="Landings" value={totals.ldgs} unit="" accent={C.green}/>
            </div>

            {/* Filters */}
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12,alignItems:"center"}}>
              <input style={{...sInp,maxWidth:200,padding:"6px 10px"}} placeholder="🔍 Search…" value={search} onChange={e=>setSearch(e.target.value)}/>
              <select style={{...sSel,maxWidth:160,padding:"6px 10px"}} value={filterType} onChange={e=>setFilterType(e.target.value)}>
                <option value="">All types</option>
                {[...new Set(entries.map(e=>e.aircraftType).filter(Boolean))].sort().map(t=><option key={t}>{t}</option>)}
              </select>
              <select style={{...sSel,maxWidth:180,padding:"6px 10px"}} value={filterRole} onChange={e=>setFilterRole(e.target.value)}>
                <option value="">All roles</option>
                {PILOT_ROLES.map(r=><option key={r}>{r}</option>)}
              </select>
              <input style={{...sInp,maxWidth:130,padding:"6px 10px"}} type="date" value={filterDate.from} onChange={e=>setFilterDate(p=>({...p,from:e.target.value}))}/>
              <span style={{color:C.muted,fontSize:12}}>→</span>
              <input style={{...sInp,maxWidth:130,padding:"6px 10px"}} type="date" value={filterDate.to} onChange={e=>setFilterDate(p=>({...p,to:e.target.value}))}/>
              {(search||filterType||filterRole||filterDate.from||filterDate.to)&&(
                <button onClick={()=>{setSearch("");setFilterType("");setFilterRole("");setFilterDate({from:"",to:""}); }} style={{background:"none",border:`1px solid ${C.muted}`,color:C.muted,borderRadius:5,padding:"5px 10px",fontSize:12,cursor:"pointer"}}>Clear</button>
              )}
              <span style={{marginLeft:"auto",fontSize:11,color:C.muted}}>{filtered.length.toLocaleString()} entries</span>
            </div>

            {/* Column headers */}
            <div style={{display:"grid",gridTemplateColumns:"88px 1fr 110px 64px 64px 64px 70px",gap:4,padding:"5px 10px",fontSize:9,color:C.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:3}}>
              {["Date","Aircraft / Route / Crew","Role","Block","PIC","Night","Ldgs"].map(h=><div key={h}>{h}</div>)}
            </div>

            {filtered.length===0&&(
              <div style={{textAlign:"center",padding:"50px 20px",color:C.muted}}>
                <div style={{fontSize:36,marginBottom:10}}>📋</div>
                <div>No entries match your filters</div>
              </div>
            )}

            {filtered.map(e=>{
              const isSim=e.dutyType&&e.dutyType.includes("Simulator");
              const isGnd=e.dutyType==="Ground Duty"||e.dutyType==="Admin";
              const ft=isSim?(e.simTime||0):(e.totalTime||0);
              const roleCol=e.pilotRole==="PIC"?C.amber:e.pilotRole?.startsWith("P1(")?C.purple:e.pilotRole?.includes("SFI")||e.pilotRole?.includes("Instructor")?C.green:C.teal;
              const ldgs=(e.dayLandings||e.landings||0)+(e.nightLandings||0);
              return (
                <div key={e.id} onClick={()=>setViewEntry(e)}
                  style={{display:"grid",gridTemplateColumns:"88px 1fr 110px 64px 64px 64px 70px",gap:4,padding:"9px 10px",background:isGnd?C.surf:C.card,borderRadius:7,marginBottom:3,border:`1px solid ${isGnd?C.border+"88":C.border}`,cursor:"pointer",transition:"border-color 0.12s"}}
                  onMouseEnter={x=>x.currentTarget.style.borderColor=C.amber}
                  onMouseLeave={x=>x.currentTarget.style.borderColor=isGnd?C.border+"88":C.border}>
                  <div style={{fontFamily:"monospace",fontSize:11,color:C.steel}}>{fmtDate(e.date)}</div>
                  <div>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <span style={{fontWeight:700,color:isSim?C.teal:isGnd?C.muted:C.text,fontSize:13}}>{e.aircraftReg||e.aircraftType}</span>
                      {e.flightNumber&&<span style={{fontSize:10,color:C.muted,fontFamily:"monospace"}}>{e.flightNumber}</span>}

                    </div>
                    {!isGnd&&(e.route||e.depAirport)&&(
                      <div style={{fontSize:11,color:C.steel,marginTop:1,fontFamily:"monospace"}}>{e.route||(e.depAirport&&e.arrAirport?`${e.depAirport}→${e.arrAirport}`:"")}</div>
                    )}
                    {(e.p2||e.copilot)&&<div style={{fontSize:10,color:C.muted,marginTop:1}}>SIC: {e.p2||e.copilot}</div>}
                    {e.remarks&&<div style={{fontSize:10,color:C.muted+"cc",marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:260}}>{e.remarks}</div>}
                  </div>
                  <div style={{fontSize:11,color:roleCol,fontWeight:600}}>{e.pilotRole}</div>
                  <div style={{fontFamily:"monospace",fontSize:12,color:C.amber,fontWeight:700}}>{hhmm(ft)}</div>
                  <div style={{fontFamily:"monospace",fontSize:12,color:C.teal}}>{hhmm(e.pic||0)}</div>
                  <div style={{fontFamily:"monospace",fontSize:12,color:C.blue}}>{hhmm(e.night||0)}</div>
                  <div style={{fontFamily:"monospace",fontSize:12,color:C.steel}}>
                    {ldgs>0?`${e.dayLandings||e.landings||0}D ${e.nightLandings||0}N`:"—"}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* ══ TOTALS TAB ══ */}
        {tab==="totals"&&(
          <div>
            <h2 style={{margin:"0 0 6px",fontSize:19,color:C.text}}>Career Totals</h2>
            <p style={{color:C.steel,fontSize:12,margin:"0 0 18px"}}>
              Grand total: <span style={{color:C.amber,fontFamily:"monospace",fontWeight:700}}>{totals.total.toFixed(1)}h</span>
              <span style={{color:C.muted}}> · Flight: {totals.flight.toFixed(1)}h · Simulator: {totals.sim.toFixed(1)}h</span>
            </p>

            {/* Full SACAA breakdown */}
            <div style={{background:C.card,borderRadius:10,padding:"16px 18px",marginBottom:18,border:`1px solid ${C.border}`}}>
              <div style={{fontSize:10,color:C.steel,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:12}}>SACAA CAR — Cols 14–29 Complete Breakdown</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:10}}>
                {[
                  ["Total Career",totals.total,C.amber],
                  ["Total Flight",totals.flight,C.amber],
                  ["PIC",totals.pic,C.teal],
                  ["P1(S)/PICUS",totals.picus,C.purple],
                  ["Co-Pilot/SIC",totals.sic,C.steel],
                  ["Dual/Instr",totals.dual,C.green],
                  ["Night",totals.night,C.blue],
                  ["IFR/Actual Inst",totals.ifr,C.purple],
                  ["Cross Country",totals.xc,C.teal],
                  ["Simulator",totals.sim,C.muted],
                  ["Day Landings",totals.ldgs,C.green,""],

                  ["Approaches",totals.approaches,C.teal,""],

              {/* ── REPORT 2: Last 3 Logbook Pages (CAR 61.03–61.08.6(c)) ── */}
              <div style={{background:C.bg,border:`1px solid ${C.amber}`,borderRadius:8,padding:"8px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:16}}>📋</span>
                <span style={{fontWeight:700,color:C.amber,fontSize:13}}>Report 2 — Last 3 Logbook Pages</span>
                <span style={{fontSize:11,color:C.steel}}>CAR 61.03–61.08.6(c) · Commissioner of Oaths certification required</span>
              </div>
              <Last3PagesTable/>

              {/* ── REPORT 3: 90-Day Print Summary (CAR 61.01.8(1)) ── */}
              <div style={{background:C.bg,border:`1px solid ${C.teal}`,borderRadius:8,padding:"8px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:16}}>🖨</span>
                <span style={{fontWeight:700,color:C.teal,fontSize:13}}>Report 3 — 90-Day Print Period</span>
                <span style={{fontSize:11,color:C.steel}}>CAR 61.01.8(1) · Must be printed and filed in binder every 90 days</span>
              </div>
              <SummaryTable
                title={`90-Day Summary: ${cutoff90d.toLocaleDateString("en-ZA")} – ${nowD.toLocaleDateString("en-ZA")}`}
                subtitle={`CAR 61.01.8(1) — ${last90d.length} entries · Print and file in sequential binder`}
                rows={[
                  ["Total Time", hhmm(s90.total), C.teal],
                  ["Total Flight", hhmm(s90.flight), C.amber],
                  ["Simulator", hhmm(s90.sim), C.muted],
                  ["PIC", hhmm(s90.pic), C.teal],
                  ["P1(S)/PICUS", hhmm(s90.picus), C.purple],
                  ["Co-Pilot/SIC", hhmm(s90.sic), C.steel],
                  ["Night", hhmm(s90.night), C.blue],
                  ["IFR Actual", hhmm(s90.ifr), C.purple],
                  ["Day Landings", String(s90.ldgs), C.green],
                  ["Night Landings", String(s90.nldgs), C.blue],
                  ["Autolands", String(s90.auto), C.teal],
                  ["Approaches", String(s90.apchs), C.teal],
                  ["Entries", String(last90d.length), C.steel],
                ]}
              />

              {/* ── REPORT 4: Grand Career Totals ── */}
              <div style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:16}}>📊</span>
                <span style={{fontWeight:700,color:C.text,fontSize:13}}>Report 4 — Career Grand Totals</span>
                <span style={{fontSize:11,color:C.steel}}>All time from 01/01/1997 to {printDate}</span>
              </div>
              <SummaryTable
                title="Career Grand Totals — All Time"
                subtitle={`${entries.length.toLocaleString()} entries · 01 Jan 1997 – ${printDate}`}
                rows={[
                  ["Grand Total", hhmm(sAll.total), C.amber],
                  ["Total Flight", hhmm(sAll.flight), C.amber],
                  ["Simulator", hhmm(sAll.sim), C.muted],
                  ["PIC", hhmm(sAll.pic), C.teal],
                  ["P1(S)/PICUS", hhmm(sAll.picus), C.purple],
                  ["Co-Pilot/SIC", hhmm(sAll.sic), C.steel],
                  ["Dual/Instr", hhmm(sAll.dual), C.green],
                  ["Night", hhmm(sAll.night), C.blue],
                  ["IFR Actual", hhmm(sAll.ifr), C.purple],
                  ["Cross Country", hhmm(sAll.xc), C.teal],
                  ["Day Landings", String(sAll.ldgs), C.green],
                  ["Night Landings", String(sAll.nldgs), C.blue],
                  ["Autolands", String(sAll.auto), C.teal],
                  ["Approaches", String(sAll.apchs), C.teal],
                  ["Holds", String(sAll.holds||0), C.amber],
                ]}
              />

              {/* Certification block for printing */}
              <div style={{background:C.card,border:`2px solid ${C.amber}`,borderRadius:10,padding:"20px 22px",marginTop:24}}>
                <div style={{fontWeight:800,fontSize:14,color:C.amber,marginBottom:12}}>Commissioner of Oaths Certification</div>
                <div style={{fontSize:12,color:C.steel,lineHeight:1.8,marginBottom:16}}>
                  I, the undersigned, being a Commissioner of Oaths, hereby certify that this is a true and correct copy
                  of the logbook summary for pilot <strong style={{color:C.text}}>G. Durr</strong> (ATPL(A)), as required by
                  CAR 61.01.5(13), 61.03.6(c), 61.04.6(c), 61.05.6(c), 61.06.6(c), 61.07.6(c) and 61.08.6(c).
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:24,marginTop:20}}>
                  {[
                    ["Pilot Name","G. Durr"],
                    ["Licence / Rating","ATPL(A) · SACAA"],
                    ["Date of Summary",printDate],
                    ["Pilot Signature","_________________________"],
                    ["Commissioner Name","_________________________"],
                    ["Commissioner Signature","_________________________"],
                    ["Date Certified","_________________________"],
                    ["Commissioner Stamp","_________________________"],
                  ].map(([l,v])=>(
                    <div key={l} style={{borderBottom:`1px solid ${C.border}`,paddingBottom:6}}>
                      <div style={{fontSize:9,color:C.muted,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:4}}>{l}</div>
                      <div style={{fontSize:13,color:C.dim,fontFamily:v.startsWith("_")?"monospace":"inherit"}}>{v}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          );
        })()}

        {/* ══ PILOT TAB ══ */}
        {tab==="pilot"&&(
          <div>
            <h2 style={{margin:"0 0 18px",fontSize:19,color:C.text}}>Pilot Profile</h2>
            <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"20px 22px",maxWidth:480,marginBottom:24}}>
              <div style={{display:"flex",gap:4,marginBottom:16}}>
                <div style={{width:48,height:48,borderRadius:10,background:C.amber+"22",border:`1px solid ${C.amber}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>👤</div>
                <div style={{marginLeft:10}}>
                  <div style={{fontWeight:800,fontSize:17,color:C.text}}>G. Durr</div>
                  <div style={{fontSize:12,color:C.steel}}>ATPL(A) · SACAA</div>
                  <div style={{fontSize:11,color:C.teal,marginTop:2}}>17,142.7h Flight · 1,708.2h Sim</div>
                </div>
              </div>
              {[
                ["Full Name","G. Durr"],
                ["Rating","ATPL(A)"],
                ["Authority","SACAA"],
                ["Logbook period","01 Jan 1997 – 23 Jun 2026"],
                ["Total entries",entries.length.toLocaleString()],
                ["Total time",(totals.flight).toFixed(1)+"h flight + "+totals.sim.toFixed(1)+"h sim"],
                ["PIC time",totals.pic.toFixed(1)+"h"],
                ["Night time",totals.night.toFixed(1)+"h"],
                ["Types flown",Object.keys(byType).length.toString()],
              ].map(([l,v])=>(
                <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:`1px solid ${C.border}`,fontSize:13}}>
                  <span style={{color:C.steel}}>{l}</span>
                  <span style={{color:C.text,fontFamily:"monospace"}}>{v}</span>
                </div>
              ))}
            </div>

            <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"16px 20px",maxWidth:480}}>
              <div style={{fontSize:10,color:C.steel,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:12}}>Regulations Tracked</div>
              {["CAR Part 61 — Pilot Licences & Ratings","CAR Part 61.12 — Currency Requirements","CAR Part 91 — General Operating Rules","CAR Part 91.04 — FDP Limitations","SACAA CAA-24 Format — A4 Logbook","All times UTC / Zulu"].map(r=>(
                <div key={r} style={{fontSize:12,color:C.muted,padding:"4px 0",borderBottom:`1px solid ${C.border}22`}}>✓ {r}</div>
              ))}
            </div>
          </div>
        )}

      </div>

      {/* ── Modals ── */}
      <Modal open={showNew} onClose={()=>setShowNew(false)} title="New Log Entry" wide>
        <EntryForm onSave={saveEntry} onCancel={()=>setShowNew(false)} allAC={allAC}/>
      </Modal>

      <Modal open={!!editEntry} onClose={()=>setEditEntry(null)} title="Edit Entry" wide>
        {editEntry&&<EntryForm initial={editEntry} onSave={saveEntry} onCancel={()=>setEditEntry(null)} allAC={allAC}/>}
      </Modal>

      <Modal open={!!viewEntry} onClose={()=>setViewEntry(null)} title="Entry Detail">
        <EntryDetail e={viewEntry} onEdit={e=>{setViewEntry(null);setEditEntry(e);}} onDelete={deleteEntry} onClose={()=>setViewEntry(null)}/>
      </Modal>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(AviLog, null));
</script>

<script>
// Register service worker for offline use (PWA)
if('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js').catch(function(){});
  });
}
</script>
</body>
</html>
